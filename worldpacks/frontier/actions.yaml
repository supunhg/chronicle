# Frontier world pack: 3-layer action rules
# chronicle-spec.md §5.3
#
# Layer 1 (hard actions) is defined in code: internal/simulation/goal.go.
# Layer 2 (contextual) is rule-expanded from this file. The engine
# evaluates each rule per NPC per tick; matching rules add the action
# to the candidate set with the listed preconditions.
#
# Layer 3 (opportunistic) is event-driven and populated by the Event
# Engine. Out of scope for Phase 3 v1.

# All action effects target entity state. Effects use a tiny DSL:
#   "relationship.<axis>"     -> "target.<id>.<axis>"
#   "needs.<need>"            -> +/- delta
#   "inventory.<resource>"    -> +/- delta
#   "wealth"                  -> +/- delta
# When preconditions or effects reference a target, the rule is
# evaluated for each candidate target (other NPCs, locations, etc.).

contextual:
  # ---- Social ----
  - id: "court"
    when:
      needs: { loneliness: ">60" }
      target_present: true
    preconditions:
      - "self.alive"
      - "target.alive"
      - "self.age >= 16"
    effects:
      relationship: { trust: +5, attraction: +3 }
      needs: { loneliness: -10 }

  - id: "gossip"
    when:
      needs: { social: ">50" }
    preconditions:
      - "self.alive"
    effects:
      knowledge: +1

  - id: "befriend"
    when:
      needs: { companionship: ">60" }
      target_present: true
    preconditions:
      - "self.alive"
      - "target.alive"
    effects:
      relationship: { trust: +3, respect: +2 }
      needs: { companionship: -8 }

  - id: "propose_marriage"
    when:
      needs: { loneliness: ">40", romance: ">50" }
      target_present: true
    preconditions:
      - "self.alive"
      - "target.alive"
      - "self.age >= 16"
      - "self.spouse_id == ''"
      - "target.spouse_id == ''"
    effects:
      relationship: { trust: +10, loyalty: +15, attraction: +5 }

  # ---- Economic ----
  - id: "seek_employment"
    when:
      needs: { wealth: "<50" }
    preconditions:
      - "self.alive"
      - "self.age >= 16"
    effects:
      needs: { wealth: +20, hunger: -5 }

  - id: "start_business"
    when:
      needs: { wealth: ">1000", ambition: ">60" }
    preconditions:
      - "self.alive"
      - "self.age >= 18"
      - "self.location_id == 'blackwater'"
    effects:
      occupation_change: "merchant"
      needs: { wealth: -500, status: +20 }

  - id: "buy_food"
    when:
      needs: { hunger: "<30" }
    preconditions:
      - "self.alive"
      - "self.location_id == 'blackwater'"
      - "self.wealth >= 5"
    effects:
      needs: { hunger: +30 }
      wealth: -5

  - id: "sell_goods"
    when:
      needs: { wealth: "<100" }
    preconditions:
      - "self.alive"
      - "self.location_id == 'blackwater'"
    effects:
      needs: { wealth: +15 }

  # ---- Survival ----
  - id: "seek_food"
    when:
      needs: { hunger: "<20" }
    preconditions:
      - "self.alive"
    effects:
      needs: { hunger: +25, safety: -5 }

  - id: "seek_healing"
    when:
      needs: { health: "<30" }
    preconditions:
      - "self.alive"
      - "self.location_id == 'blackwater'"
    effects:
      needs: { health: +25 }
      wealth: -10

  - id: "seek_shelter"
    when:
      needs: { safety: "<30" }
    preconditions:
      - "self.alive"
    effects:
      needs: { safety: +20 }

  # ---- Family ----
  - id: "seek_remarriage"
    when:
      needs: { loneliness: ">50" }
      spouse_recently_died: true
    preconditions:
      - "self.alive"
      - "self.spouse_id == ''"
      - "self.age >= 30"
    effects:
      needs: { loneliness: -10 }

  - id: "raise_child"
    when:
      has_child_under_5: true
    preconditions:
      - "self.alive"
      - "self.age >= 16"
    effects:
      needs: { companionship: -5, safety: -3 }

  - id: "teach_offspring"
    when:
      has_child_age_6_to_15: true
    preconditions:
      - "self.alive"
      - "self.occupation in ['teacher','priest','blacksmith','merchant','farmer']"
    effects:
      relationship: { respect: +2 }

  # ---- Religious / factional ----
  - id: "attend_service"
    when:
      needs: { devout: ">50" }
    preconditions:
      - "self.alive"
    effects:
      needs: { devout: -10, companionship: +5 }
      relationship: { loyalty: +2 } # toward faith_of_dawn

  - id: "tithe"
    when:
      needs: { wealth: ">200", devout: ">70" }
    preconditions:
      - "self.alive"
    effects:
      wealth: -10
      relationship: { loyalty: +5, respect: +3 }

  # ---- Town Council ----
  - id: "run_for_office"
    when:
      needs: { ambition: ">80", status: ">60" }
    preconditions:
      - "self.alive"
      - "self.age >= 30"
      - "self.location_id == 'blackwater'"
    effects:
      relationship: { respect: +5, loyalty: -2 }
