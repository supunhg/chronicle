# Chronicle v2 — frontier worldpack: nodes
#
# Phase 38.A + §38.B/C authoring. ~43 nodes total:
#   - 15 from Phase 38.A (preserved verbatim):
#     4 protagonist openings + 1 shared act1.ashwick_entrance
#     + 5 downstream continuation + 4 deep exclusives
#   - 4 Act 1 supplement (this phase):
#     dragon_relic_in_vault, act1_close_ridge,
#     mountain_path_begins, aldric_arrival
#   - ~24 Act 2 scenes (this phase):
#     5 companion anchor arcs (Selene / Orion / Maren / Aldric /
#     Harlan), 4 protagonist detours (kael_letter /
#     lyra_runic_slate / raven_brother / aria_pilgrim_book)
#     that route to the existing deep exclusives, 2 pathway
#     connectors, 1 closeup, 1 act3_handoff terminal.
#
# Arc structure (§38.C acceptance: each protagonist can reach
# end-of-Act-2 + each deep exclusive is reachable + 6 companion
# events fire at anchor encounters):
#
#   [Act 1: 19 nodes] -- relic recovered -> mountain path
#     act2_entry -> mountain_crossing -> selenes_tower
#     sequence -> pathway_a -> orions_camp sequence ->
#     pathway_b -> maren_library sequence -> aldric_keep
#     sequence -> harlan_roadside sequence -> closeup
#     -> act3_handoff.
#
#   Each protagonist's path branches INTO their deep
#   exclusive_node[1] via a context-relevant detour:
#     Kael  -> act2.kael_letter   -> kael.scholars_final_chapter
#     Lyra  -> act2.lyra_runic_slate -> lyra.runic_trial
#     Raven -> act2.raven_brother  -> raven.heirs_judgment
#     Aria  -> act2.aria_pilgrim_book -> aria.dawns_first_prayer
#   Each detour has a condition on the protagonist's
#   starting_flag, so only that protagonist visits it.

nodes:

  # ============================================================
  # SECTION A. Act 1 — preserved verbatim from Phase 38.A
  # ============================================================

  - id: "kael.fringe_searching"
    title: "Prologue I — Kael on the fringe"
    text: |
      You scan the barren slope where your order's keep once
      stood. The wind has scoured the stones clean of the
      inscription that marked them — but you were there the day
      it was raised, and you were there the day it fell. Smoke
      still rises from the lower valleys below. You have a sword
      on your hip, a half-remembered oath on your tongue, and no
      particular reason to keep either.
    choices:
      - id: "continue_to_ashwick"
        text: "Continue south, toward Ashwick."
        next_node_id: "act1.ashwick_entrance"
        effects:
          - set_flag: "began_journey"
          - set_flag: "Kael_at_fringe"

  - id: "lyra.runesmith_workshop"
    title: "Prologue II — Lyra at the workshop"
    text: |
      The chisel cuts a precise arc into the slate. You steady
      your hand and turn the slate at the angle your grandmother
      taught you; the rune forms, holds its shape for two breaths,
      then fades. As it always does. Your worktable is stacked
      with half-finished slates, the floor is scattered with
      filings, and the door has a brand-new lock you put on the
      second your banishment notice arrived. The sign outside
      still says "Lyra — commissions taken". You turn the slate
      again.
    choices:
      - id: "continue_to_ashwick"
        text: "Lay the chisel down. Head for Ashwick."
        next_node_id: "act1.ashwick_entrance"
        effects:
          - set_flag: "began_journey"
          - set_flag: "Lyra_at_workshop"

  - id: "raven.disgraced_inn"
    title: "Prologue III — Raven in hiding"
    text: |
      The inn's common room is half-empty and the other half
      does not know you. That is precisely how you have arranged
      it — three cities in, you have stopped using your name,
      stopped using your title, and stopped wearing the signet
      ring that has hung on a leather cord beneath your shirt
      since the night your aunt's men came for you. Tonight you
      sleep in the back room; tomorrow you take the road to
      Ashwick, where there's said to be work for anyone willing
      to ask.
    choices:
      - id: "continue_to_ashwick"
        text: "Slip out before dawn. Head for Ashwick."
        next_node_id: "act1.ashwick_entrance"
        effects:
          - set_flag: "began_journey"
          - set_flag: "Raven_at_inn"

  - id: "aria.dawn_temple"
    title: "Prologue IV — Aria at the temple"
    text: |
      First light crosses the temple floor in three long shafts.
      You kneel at the third, as the novices do, as you have
      done since the morning they found you on the road and
      Father Holt put a cup of water in your hand. He is dead
      now. The order is older than he was, and the roads between
      here and Ashwick are not safe, and the elders have asked
      you twice whether you might carry a message for the
      cathedral there. You tell them, yes. You tell them, at
      first light.
    choices:
      - id: "continue_to_ashwick"
        text: "Take the road before the next bell. Head for Ashwick."
        next_node_id: "act1.ashwick_entrance"
        effects:
          - set_flag: "began_journey"
          - set_flag: "Aria_at_temple"

  - id: "act1.ashwick_entrance"
    title: "EX01 — The frontier town of Ashwick"
    text: |
      You stand at the threshold of Greyhall Keep. The wind
      carries the smell of woodsmoke and something older —
      incense, or the memory of incense, from the ruins on
      the eastern ridge.
    choices:
      - id: "enter_keep"
        text: "Enter the keep."
        next_node_id: "act1.greyhall_keep"
        effects:
          - set_flag: "entered_keep"
      - id: "head_east"
        text: "Head for the eastern ridge."
        next_node_id: "act1.eastern_ridge"
        conditions:
          - variable: { key: "Courage", value: 30 }
      - id: "wait_watch"
        text: "Wait in the square and watch."
        next_node_id: "act1.wait_at_square"

  - id: "act1.wait_at_square"
    title: "EX01a — Waiting at the square"
    text: |
      You lean against the well. People pass; the sun moves;
      nothing happens, which is itself a kind of information.
      The eastern ridge is half in cloud, the keep gate has a
      fresh hinge oil in it, and someone has tied a red cloth to
      the post by the well that may or may not mean what it
      would have meant forty years ago.
    choices:
      - id: "enter_after_wait"
        text: "Stand up. Cross to the keep."
        next_node_id: "act1.greyhall_keep"

  - id: "act1.greyhall_keep"
    title: "EX02 — Inside Greyhall Keep"
    text: |
      The hall is quieter than it should be. The fire has burned
      down to ash and memory; the chairs are set as if for a
      meeting that no one came to. At the back, behind a table,
      a woman in a sun-faded coat looks up at you with the
      patient attention of someone who has been waiting days.
    choices:
      - id: "speak_to_keeper"
        text: "Speak to the keeper."
        next_node_id: "act1.keeper_interview"
        effects:
          - set_flag: "began_journey"
          - trigger_event: "ally_call"
      - id: "step_back_out"
        text: "Step back out."
        next_node_id: "act1.ashwick_entrance"
      # Phase 38.B/C addition: alternative direct route to
      # Act 2 handoff if the protagonist already has the relic
      # (rare path, would require entering Ashwick with
      # relic_claimed set by some external route).
      - id: "depart_directly"
        text: "Thank her and leave for the eastern trail."
        next_node_id: "act1.aldric_arrival"
        conditions:
          - flag: "relic_claimed"

  - id: "act1.eastern_ridge"
    title: "EX03 — The Eastern Ridge"
    text: |
      Old ruins stretch along the ridge. The carved pillars lean
      into the wind like tired old men; a half-buried mosaic
      shows a constellation no longer on any cartographer's chart.
      The wind is colder up here than it had any right to be.
    choices:
      - id: "investigate_ruins"
        text: "Investigate the ruins."
        next_node_id: "act1.void_dragon_reveal"
        effects:
          - set_flag: "saw_eastern_ridge"
          - modify_variable: { key: "Courage", value: 60 }
          - trigger_event: "dragon_stirs"
      - id: "return_to_keep"
        text: "Head back down to the keep."
        next_node_id: "act1.greyhall_keep"

  - id: "act1.keeper_interview"
    title: "EX04 — The keeper speaks"
    text: |
      She pours you water; she does not pour it into a cup. "They
      took the southern road last night," she says. "Four. Maybe
      five." She has not asked your name — and you realise she
      does not need to. She has been expecting someone to walk
      through the keep's door for weeks.
    choices:
      # Phase 38.B/C: reroute offer_help to the Dragon Relic
      # vault scene (introduces the relic quest). The keeper's
      # commission is to retrieve it; the ally_call sidebar
      # (Elara's arrival) now follows.
      - id: "offer_help"
        text: "Offer to help."
        next_node_id: "act1.dragon_relic_in_vault"
        effects:
          - set_flag: "accepted_commission"
          - modify_reputation: { faction: "kingdom", value: 5 }
      - id: "decline"
        text: "Decline. Return to the square."
        next_node_id: "act1.ashwick_entrance"

  - id: "act1.void_dragon_reveal"
    title: "EX05 — The void dragon reveal"
    text: |
      The relief at the base of the eastern pillar is not the
      constellation you thought. It is a serpent, coiled, the
      size of a cathedral, and as you look at it the air above
      the ridges darkens — not a cloud, not a shadow, but a
      void-shape with the slow movement of something waking.
      Whatever is in the inner chamber is older than the keep.
      Older than the kingdom. Older, you suspect, than the
      language you are thinking in.
    choices:
      - id: "flee_back"
        text: "Flee back toward the keep."
        next_node_id: "act1.greyhall_keep"
        effects:
          - set_flag: "saw_void_dragon"
      # Phase 38.B/C addition: the inner chamber IS where
      # the Dragon Relic sits; traverse into it to recover
      # the relic and progress the relic quest.
      - id: "traverse_relic_chamber"
        text: "Step into the inner chamber."
        next_node_id: "act1.dragon_relic_in_vault"
        conditions:
          - flag: "saw_void_dragon"
        effects:
          - set_flag: "void_chamber_entered"

  - id: "act1.ally_appears_intro"
    title: "EX06 — An old friend, by chance"
    text: |
      A ranger — bow over shoulder, dirt under her nails —
      drops out of the trees with the easy confidence of someone
      who has been following you for at least an hour. "The
      keeper sent word," she says. "I am to walk with you as far
      as the southern road and possibly beyond." She introduces
      herself as Elara, and you remember that name from
      somewhere — the eastern ridge, perhaps, or a tavern in
      another town, or a story your grandmother told you once.
    choices:
      # Phase 38.B/C: forward to Act 1's close instead of
      # looping back to keeper_interview (Phase 38.A reviewer
      # flagged the loop as a UX trap; the close is the Act 1
      # terminal that hands the protagonist into Act 2).
      - id: "accept_elara"
        text: "Travel with her."
        next_node_id: "act1.act1_close_ridge"
        effects:
          - set_flag: "recruited_elara"
          - modify_relationship: { character: "Elara", axis: "trust", value: 25 }
      - id: "decline_elara"
        text: "Decline her company."
        next_node_id: "act1.ashwick_entrance"

  # ============================================================
  # SECTION B. Act 1 supplement (this phase) — Dragon Relic
  # quest completes the relic quest hookup.
  # ============================================================

  - id: "act1.dragon_relic_in_vault"
    title: "EX07 — The dragon relic in the vault"
    text: |
      Behind the false wall, down a stair carved for no foot but
      the relic's, you find it: a stone twice the size of your
      head, brown as river mud, half-buried in its own pedestal.
      It hums faintly when you put your hand to it — not in the
      ear, in the chest — and the hum resolves into something
      like a name you have not yet learned to say. The keeper's
      commission was to find this. Yours, it seems, is to take
      it from here.
    choices:
      - id: "claim_relic"
        text: "Take the stone."
        next_node_id: "act1.ally_appears_intro"
        effects:
          - set_flag: "relic_claimed"
          - trigger_event: "relic_rumble"
      - id: "leave_relic"
        text: "Pull your hand back. Leave it where it is."
        next_node_id: "act1.greyhall_keep"

  - id: "act1.act1_close_ridge"
    title: "EX08 — Closing the eastern ridge"
    text: |
      The relic is heavier in your pack than it should be. The
      keeper walks you to the edge of the eastern ridge; Elara
      does not say much; the void-shape over the inner chamber
      does not say anything at all. When you reach the high pass,
      the keeper stops, puts her hand on your shoulder once, then
      turns back toward Greyhall without a word. The road down to
      the mountains begins at the cairn at the top of the pass.
    choices:
      - id: "head_down_to_mountains"
        text: "Turn south. Take the road down."
        next_node_id: "act1.mountain_path_begins"
        effects:
          - set_flag: "act1_completed"

  - id: "act1.mountain_path_begins"
    title: "EX09 — Mountain path begins"
    text: |
      The road down to the mountains is older than the kingdom,
      and quieter. You are a day's walk from any hearthstone you
      can call by name, and the relic under your pack changes
      weather as you pass through it — colder here, warmer there,
      and once a long quarter-mile of nothing at all. You walk.
    choices:
      - id: "continue_to_act2"
        text: "Continue. The mountains wait."
        next_node_id: "act2.act2_entry"
        effects:
          - set_flag: "act2_started"

  - id: "act1.aldric_arrival"
    title: "EX10 — Captain Aldric arrives"
    text: |
      You do not hear Aldric until he is at the gate. He hands
      his coat to the keeper's stable-girl as if he has been
      expected for hours. He looks you over once, slowly, the
      way a man who has survived four border-wars looks at a
      candidate for a fifth. "The captain of Greyhall's guard,"
      he says, by way of introduction. "You have a relic under
      your pack. I am to walk beside you for as long as the
      spire at Aldran is silent." He does not explain further.
    choices:
      - id: "accept_aldric"
        text: "Walk with him."
        next_node_id: "act1.act1_close_ridge"
        effects:
          - set_flag: "aldric_walking"
          - modify_relationship: { character: "Aldric", axis: "respect", value: 20 }
          - modify_reputation: { faction: "kingdom", value: 10 }
      - id: "decline_aldric"
        text: "Decline. Walk alone."
        next_node_id: "act1.act1_close_ridge"
        effects:
          - modify_relationship: { character: "Aldric", axis: "respect", value: -10 }
          - modify_reputation: { faction: "kingdom", value: -5 }

  # ============================================================
  # SECTION C. Act 2 — ally-gathering arc (this phase)
  # ============================================================

  - id: "act2.act2_entry"
    title: "Act II — The mountains, the allies, the truth"
    text: |
      The mountain cross begins in the cold. Aldric, when he
      is walking with you, walks in silence for the first three
      hours and then begins to tell you where his veterans are
      buried — small cairn, small cairn, small cairn — across
      seventeen valleys. By the time the spire at Aldran is
      showing above the tree-line, he has stopped counting and
      started listening. The relic under your pack is quieter
      than it was. Something ahead is paying attention.
    choices:
      - id: "cross_into_mountains"
        text: "Cross into the mountains."
        next_node_id: "act2.mountain_crossing"
        effects:
          - set_flag: "mountain_pass_crossed"

  - id: "act2.mountain_crossing"
    title: "A1 — The mountain crossing"
    text: |
      The pass climbs through three days of cold weather. The
      first night you sleep in a shepherd's bothy whose owner
      has been dead a week and whose sheep have made their
      peace with the cold. The second night Aldric teaches you
      a sentry rhythm that turns out for the third. By the
      morning of the third day the trees are gone and the rocks
      are older than the kingdom and you are, you realise,
      exactly where the spire's hush was telling you to come.
    choices:
      - id: "approach_selenes_tower"
        text: "Approach the crystal spire."
        next_node_id: "act2.selenes_tower"
      # Phase 38.B/C: protagonist-specific detour hook.
      - id: "open_kael_letter"
        text: "Stop. Read the letter you have been carrying."
        next_node_id: "act2.kael_letter"
        conditions:
          - flag: "Kael_Protagonist"
      - id: "open_lyra_slate"
        text: "Stop. Take out the slate and the chisel."
        next_node_id: "act2.lyra_runic_slate"
        conditions:
          - flag: "Lyra_Protagonist"
      - id: "open_ravens_letter"
        text: "Stop. Open the letter from your aunt's lawyers."
        next_node_id: "act2.raven_brother"
        conditions:
          - flag: "Raven_Protagonist"
      - id: "open_arias_prayer_book"
        text: "Stop. Take out the prayer book Father Holt gave you."
        next_node_id: "act2.aria_pilgrim_book"
        conditions:
          - flag: "Aria_Protagonist"

  - id: "act2.selenes_tower"
    title: "A2 — Selene's tower, outside"
    text: |
      The crystal spire is taller than it should be. Its walls
      shift in the afternoon light in ways that no mineral ever
      has, and the door is open. Selene is at the foot of the
      stairs, a slim figure in a scholar's grey, hands full of
      ink-stained pages. She sees you, sees Aldric behind you,
      sees the bulk of your pack. She does not move from where
      she is.
    choices:
      - id: "approach_selene"
        text: "Approach her."
        next_node_id: "act2.selenes_initiation"
        effects:
          - trigger_event: "selene_oath"

  - id: "act2.selenes_initiation"
    title: "A3 — Selene's initiation question"
    text: |
      "The relic you carry is older than the kingdom," Selene
      says, not as a question. "The kingdom is older than the
      spire. The spire is older than the language I am asking
      you this in. Will you let me read it for an evening?"
      The ink is still wet on the page she has been working on.
    choices:
      - id: "let_selene_read"
        text: "Take it from your pack. Let her read."
        next_node_id: "act2.selenes_farewell"
        effects:
          - set_flag: "selene_read_the_relic"
          - modify_relationship: { character: "Selene", axis: "trust", value: 30 }
          - trigger_event: "maren_teaches"
      - id: "refuse_selene"
        text: "Refuse. The relic stays with you."
        next_node_id: "act2.selenes_farewell"
        effects:
          - modify_relationship: { character: "Selene", axis: "trust", value: -15 }

  - id: "act2.selenes_farewell"
    title: "A4 — Selene's farewell"
    text: |
      Selene walks you to the edge of the spire's shadow. She
      does not thank you — she is not the sort — but she puts
      a sealed envelope into Aldric's hand and says, "For the
      kingdom, when the time comes." The road north toward
      Orion's territory is one ridge over and a day's walk.
    choices:
      - id: "head_for_orions_camp"
        text: "Take the road north."
        next_node_id: "act2.pathway_a"

  - id: "act2.pathway_a"
    title: "A5 — Pathway to Orion"
    text: |
      The high pass between Selene's spire and the mercenary
      country is held by a single shepherd, paid by both sides
      to keep the road open. He nods at Aldric, asks after a
      cousin of Aldric's by name, and does not ask you anything.
      It is the longest day of walking you have done since the
      prologue. You arrive at Orion's camp by torchlight.
    choices:
      - id: "enter_orions_camp"
        text: "Enter the camp."
        next_node_id: "act2.orions_camp"

  - id: "act2.orions_camp"
    title: "A6 — Orion's camp"
    text: |
      The mercenary camp is set on a shelf above a fast river
      where the noise of the water drowns out everything they
      want kept quiet. Orion is older than you expected; he
      looks at the relic under your pack and laughs once. "I
      have been looking for that since your grandfather's
      lifetime," he says. "Sit. Eat. You are going to lose
      sleep tonight whether you want to or not."
    choices:
      - id: "accept_orions_challenge"
        text: "Sit. Eat. Take the challenge."
        next_node_id: "act2.orions_challenge"
        effects:
          - trigger_event: "orion_betrayal"

  - id: "act2.orions_challenge"
    title: "A7 — Orion's challenge"
    text: |
      The challenge is not combat — it is to spend one night in
      the dark outside Orion's tent, alone, with the relic as
      your only companion. Orion's voice from inside the tent
      tells you, near dawn, "You can come in now." When you do,
      the camp has changed. Some of the mercenaries are gone.
      Some new ones have arrived. Harlan — Orion's second —
      hands you a bowl of broth and says nothing.
    choices:
      - id: "take_orions_broth"
        text: "Take the broth. Eat."
        next_node_id: "act2.orions_farewell"
        effects:
          - set_flag: "orion_oath_taken"
          - modify_relationship: { character: "Orion", axis: "respect", value: 25 }
          - modify_relationship: { character: "Harlan", axis: "affection", value: 10 }
      - id: "refuse_harlans_broth"
        text: "Refuse. Walk on."
        next_node_id: "act2.orions_farewell"
        effects:
          - set_flag: "orion_broken"
          - modify_relationship: { character: "Orion", axis: "respect", value: -15 }
          - trigger_event: "harlan_persuades"

  - id: "act2.orions_farewell"
    title: "A8 — Orion's farewell"
    text: |
      Orion walks you to the road south. He does not say much.
      He hands Aldric a sealed letter. He looks at the relic
      under your pack and he does not say anything about it.
      Harlan, two paces behind, touches his forehead with two
      fingers and nods once.
    choices:
      - id: "head_for_maren_library"
        text: "Take the road south."
        next_node_id: "act2.pathway_b"

  - id: "act2.pathway_b"
    title: "A9 — Pathway to Maren"
    text: |
      The road south curves through three farms that all belong
      to the same widow. Aldric knows her by name; she has not
      seen him in nine years. They speak for an hour in the
      kitchen. When you leave, she gives you a small grey
      ledger that "Maren may want to see." You do not open it.
      The library is two hills onward.
    choices:
      - id: "approach_maren_library"
        text: "Approach the library."
        next_node_id: "act2.maren_library"

  - id: "act2.maren_library"
    title: "A10 — Maren's library"
    text: |
      The library is older than the kingdom, smaller than a
      single shepherd's hut, and contains more books than any
      building you have ever been in. Maren is at the third
      desk from the door, mid-paragraph, not looking up. The
      widow's grey ledger is taken from your hand without
      comment half an hour after you put it down. She reads it
      while she works.
    choices:
      - id: "ask_first_question"
        text: "Ask her your first question."
        next_node_id: "act2.maren_first_question"
        effects:
          - trigger_event: "maren_teaches"

  - id: "act2.maren_first_question"
    title: "A11 — Maren's first question to you"
    text: |
      Maren does not ask your name. She asks why you carried
      the relic uphill for nine days and did not open the packet
      the keeper put beside it. You do not have a clean answer.
      She does, and writes it down in the margin of the widow's
      ledger and hands it back to you with a small grey seal
      pressed into the corner.
    choices:
      - id: "study_with_maren"
        text: "Stay. Study alone with her for an evening."
        next_node_id: "act2.maren_farewell"
        effects:
          - set_flag: "maren_study_complete"
          - modify_relationship: { character: "Maren", axis: "trust", value: 25 }
          - modify_reputation: { faction: "mages", value: 5 }
      - id: "thank_maren"
        text: "Thank her and go."
        next_node_id: "act2.maren_farewell"
        effects:
          - modify_relationship: { character: "Maren", axis: "trust", value: 5 }

  - id: "act2.maren_farewell"
    title: "A12 — Maren's farewell"
    text: |
      Maren does not walk you out. The grey ledger you are
      carrying has your name in the margin, in her hand, and
      she has not asked your name once. The road west toward
      Aldric's keep is lined with the willow trees she likes
      to read under. You follow it.
    choices:
      - id: "head_for_aldrics_keep"
        text: "Take the road west."
        next_node_id: "act2.aldric_keep"

  - id: "act2.aldric_keep"
    title: "A13 — Aldric's keep"
    text: |
      Aldric's keep is older than the kingdom's capital and
      smaller than most town halls. Inside there is one
      long table, twelve chairs, a hearth that has never gone
      out, and a single portrait of a man who looks more like
      Aldric than Aldric does. He doesn't explain it. He sits
      at one end of the table and waits.
    choices:
      - id: "accept_aldrics_commission"
        text: "Accept his commission."
        next_node_id: "act2.aldric_farewell"
        effects:
          - set_flag: "aldric_commissioned"
          - trigger_event: "aldric_commission"
          - modify_relationship: { character: "Aldric", axis: "trust", value: 20 }
          - modify_reputation: { faction: "kingdom", value: 5 }
      - id: "decline_aldrics_commission"
        text: "Decline. Walk out."
        next_node_id: "act2.aldric_farewell"
        effects:
          - modify_relationship: { character: "Aldric", axis: "trust", value: -10 }
          - modify_reputation: { faction: "kingdom", value: -5 }

  - id: "act2.aldric_farewell"
    title: "A14 — Aldric's farewell"
    text: |
      The road south toward Harlan's roadside post is an old
      road — older than Aldric's keep, older than the kingdom,
      older than the language the milestone-cuts are written
      in. Aldric gives you the letter Orion gave him at the
      pass. "For Harlan," he says. "He has not heard from
      Orion in years." You take it.
    choices:
      - id: "head_for_harlans_roadside"
        text: "Take the road south."
        next_node_id: "act2.harlan_roadside"

  - id: "act2.harlan_roadside"
    title: "A15 — Harlan's roadside"
    text: |
      Harlan's roadside post is a half-collapsed waystation with
      a roof Aldric would not put his horse under. Harlan has
      made it work by sleeping on the side with fewer leaks.
      He sees the letter from a hundred paces. He reads it
      without opening it. He hands it back.
    choices:
      - id: "give_harlan_the_letter"
        text: "Give him the letter."
        next_node_id: "act2.harlan_warning"
        effects:
          - modify_relationship: { character: "Harlan", axis: "trust", value: 25 }
          - trigger_event: "harlan_persuades"

  - id: "act2.harlan_warning"
    title: "A16 — Harlan's warning"
    text: |
      "Don't go south," Harlan says. "Not tonight. The road
      south is held by the emperor's men; they have been
      waiting for someone with a relic under their pack for
      three weeks." He shows you the river path instead. It
      is longer. It is safer. The choice is yours.
    choices:
      - id: "follow_harlans_warning"
        text: "Follow the river path."
        next_node_id: "act2.harlan_farewell"
        effects:
          - modify_relationship: { character: "Harlan", axis: "affection", value: 15 }
      - id: "ignore_harlans_warning"
        text: "Take the road south as Aldric did."
        next_node_id: "act2.harlan_farewell"
        effects:
          - modify_relationship: { character: "Harlan", axis: "affection", value: -10 }
          - modify_reputation: { faction: "underworld", value: -10 }

  - id: "act2.harlan_farewell"
    title: "A17 — Harlan's farewell"
    text: |
      Harlan walks you to the edge of his post. He does not
      say goodbye — he says "the keep of the Old Kings is two
      hours downstream, and the relic you are carrying belongs
      to them." He is right; the relic is quieter than it has
      been since you took it from Greyhall.
    choices:
      - id: "head_for_act2_closeup"
        text: "Walk on."
        next_node_id: "act2.act2_closeup"

  - id: "act2.act2_closeup"
    title: "A18 — The Act 2 closeup"
    text: |
      You sit by the side of the river path long enough to
      count the things that have changed: the relic is quieter;
      Aldric has stopped writing to the kingdom; Elara has
      stopped writing to her captain; Selene's envelope is in
      Aldric's pack; Orion's letter is in Harlan's; Maren's
      ledger has your name in the margin. You have not crossed
      the kingdom's border, but you have crossed four others.
    choices:
      - id: "continue_to_act3"
        text: "Stand up. Continue."
        next_node_id: "act2.act3_handoff"

  - id: "act2.act3_handoff"
    title: "A19 — Handoff to Act 3"
    text: |
      The keep of the Old Kings is older than the kingdom, and
      its doors are open. There is a mural of a serpent coiled
      around the world; its mouth is open; the relic under
      your pack rings once when you pass under it. The scarlet
      road rises behind the keep and descends into a long
      valley you have not seen before. The person waiting for
      you at the doorway is someone you already know. (Act 3
      begins here; this handoff point feeds Phase 38.D's
      act3.keep_interior.)
    choices:
      - id: "enter_the_keep"
        text: "Enter the keep."
        next_node_id: "act3.keep_interior"
        effects:
          - set_flag: "act2_completed"

  # ============================================================
  # SECTION D. Act 2 protagonist-specific detours (this phase).
  # Each one routes to that protagonist's deep exclusive,
  # currently OR eventually; the user-author path is via the
  # upstream `open_kael_letter` etc. choices in
  # act2.mountain_crossing (Section C).
  # ============================================================

  - id: "act2.kael_letter"
    title: "KAEL — A letter from the order"
    text: |
      The letter is sealed in the old wax. You have carried it
      since the morning after your order's keep fell. You
      break the seal on a flat stone with a view of the
      mountains. Inside: a single line in your grandmother's
      hand, and below it a name you have not thought of for
      nineteen years. The scholar's chapter is not finished.
    choices:
      - id: "fulfill_the_chapter"
        text: "Fulfill the chapter."
        next_node_id: "kael.scholars_final_chapter"
        effects:
          - set_flag: "kael_chapter_open"
          - modify_reputation: { faction: "kingdom", value: -5 }

  - id: "kael.scholars_final_chapter"
    title: "DEEP — Kael's final chapter with the order"
    text: |
      The librarian's lent lamp has burned low. You have read the
      manuscript through twice; you read it through a third time.
      The inscription matches what you remember of the stones; the
      order's founder was your order's founder. Your grandmother
      told you this would happen, and you did not believe her.
      The manuscript closes itself.
    choices:
      - id: "close_the_book"
        text: "Close the manuscript."
        next_node_id: "act2.mountain_crossing"
        conditions:
          - flag: "Kael_Protagonist"
        effects:
          - set_flag: "kael_chapter_closed"

  - id: "act2.lyra_runic_slate"
    title: "LYRA — A slate from the workshop"
    text: |
      The chisel is not the one your grandmother taught you to
      hold, but it is the one she left in your worktable. The
      slate you lay flat on the rock holds the morning light
      better than the ones at the workshop. You inscribe the
      rune your grandmother taught you, and this one — for the
      first time — holds.
    choices:
      - id: "fulfill_the_inscription"
        text: "Fulfill the inscription."
        next_node_id: "lyra.runic_trial"
        effects:
          - set_flag: "lyra_inscription_open"

  - id: "lyra.runic_trial"
    title: "DEEP — Lyra's first true inscription"
    text: |
      The chalk holds its shape for three full seconds before it
      fades. Your grandmother would have laughed. The chisel feels
      half its old weight; the slate, half its age. You remember
      the lock you put on the door, and you undo it in your head,
      and you inscribe another rune that holds its shape for
      four seconds before it fades.
    choices:
      - id: "step_outside"
        text: "Step outside. Take the road."
        next_node_id: "act2.mountain_crossing"
        conditions:
          - flag: "Lyra_Protagonist"
        effects:
          - set_flag: "lyra_inscription_closed"

  - id: "act2.raven_brother"
    title: "RAVEN — A letter from your aunt's lawyers"
    text: |
      The seal is broken but the contents you already know. It
      is the second letter that surprises you. It is from a
      cousin you thought dead, asking you to come north, and
      offering a small grey box of things the aunt's lawyers
      said were not yours. The lock-box is in your pack. It
      is heavier than the relic.
    choices:
      - id: "open_the_lock_box"
        text: "Open the lock-box."
        next_node_id: "raven.heirs_judgment"
        effects:
          - set_flag: "raven_lock_box_open"

  - id: "raven.heirs_judgment"
    title: "DEEP — Raven's small inheritance"
    text: |
      You count what is in the lock-box, again, against the
      letter you can read by heart. The figures match. The aunt's
      lawyers told you there was nothing; the aunt's lawyers were
      wrong. You put the signet ring back around your neck and
      walk to the window of the room you have taken for the
      night. Dawn is not far off.
    choices:
      - id: "walk_to_window"
        text: "Walk to the window. Watch the dawn."
        next_node_id: "act2.mountain_crossing"
        conditions:
          - flag: "Raven_Protagonist"
        effects:
          - set_flag: "raven_inheritance_counted"

  - id: "act2.aria_pilgrim_book"
    title: "ARIA — A prayer book from the Faith"
    text: |
      The prayer book is the same one Father Holt gave you on
      the morning he put a cup of water in your hand. The
      cathedral in Ashwick has been writing you letters for
      three weeks; you have not answered the last two. You open
      the prayer book. The first page is the morning psalm.
      The last page is in Father Holt's hand.
    choices:
      - id: "read_the_last_page"
        text: "Read the last page."
        next_node_id: "aria.dawns_first_prayer"
        effects:
          - set_flag: "aria_book_opened"

  - id: "aria.dawns_first_prayer"
    title: "DEEP — Aria's first dawns"
    text: |
      Three shafts of light across the temple floor. The cup of
      water the novices carry. Father Holt's voice reading from
      the morning page. You kneel at the third shaft, the way
      you knelt this morning and the morning before that and
      every morning you have ever remembered, and you say the
      prayer he taught you the first time he put a cup of water
      in your hand.
    choices:
      - id: "kneel_through_prayer"
        text: "Kneel through the prayer."
        next_node_id: "act2.mountain_crossing"
        conditions:
          - flag: "Aria_Protagonist"
        effects:
          - set_flag: "aria_prayer_complete"

  # ============================================================
  # SECTION E. Act 3 — The keep's awakening + ending gates
  # (Phase 38.D)
  #
  # The 8 non-romance endings (per ARCHITECTURE.md §20) gate on
  # distinct realm flags that no earlier Act sets. This section
  # adds the realm-claim scenes that COMMIT to one ending by
  # setting the gate flag. The 3 romance variants gate on
  # relationship.axes ≥ threshold — Act 2 baseline deltas do
  # not always reach the threshold (Elara affection starts at
  # zero; Act 2 only stacks Selene to 30 trust; Act 2 only
  # stacks Orion respect, not affection), so this section
  # also adds 3 romance-conditioning scenes that bring each
  # axis to the §20 threshold.
  #
  # Realm-claim choices below are unconditional: the realm
  # claim is the moment of commitment, not a stat / narrative-
  # moment gate. Earlier §38.D drafts of
  # claim_kingdoms_throne / claim_unbound_magic /
  # claim_dragon_kinship each had a conditions block that
  # effectively locked those endings to one protagonist
  # start each (kingdom_aligned / MagicAffinity>=50 /
  # saw_void_dragon — Aria could not reach saw_void_dragon
  # because she starts at Courage 20, below the 30 needed for
  # act1.ashwick_entrance.head_east). Those three conditions
  # were dropped post-§38.D to preserve §38.E's
  # per-protagonist reachability contract. claim_serpent_crown
  # remains gated on relic_claimed because the protagonist
  # holding the relic IS the narrative gate for dragon_sovereign.
  #
  # Acceptance (PHASES.md §38.D): each of the 12 endings'
  # conditions resolves against a synthetic protagonist-path
  # WorldState in TestLoad_FrontierWorldpackPerEnding.
  # ============================================================

  - id: "act3.keep_interior"
    title: "E1 — Inside the keep of the Old Kings"
    text: |
      The relic hums. It has not stopped humming since you
      crossed under the mural and now, in the half-dark of the
      keep's interior, it hums at a pitch that makes the bricks
      answer back. The mural of the coiled serpent covers the
      dome above you; its open mouth has the colour of a
      doorway. There is a stone at the centre of the floor and
      it is older than the keep. There is a path forward.
    choices:
      # Romance-conditioning scenes first — each loops back
      # to the hub so a player who has invested deeply in one
      # companion line can still reach the realm claim.
      - id: "stand_watch_with_elara"
        text: "Stand watch with Elara for an evening."
        next_node_id: "act3.elaras_vigil"
        conditions:
          - flag: "recruited_elara"
      - id: "let_selene_finish"
        text: "Let Selene finish her reading."
        next_node_id: "act3.selenes_deep_trust"
        conditions:
          - flag: "selene_read_the_relic"
      - id: "sit_with_orion"
        text: "Sit with Orion by the fire."
        next_node_id: "act3.orions_meeting"
        conditions:
          - flag: "orion_oath_taken"
      # Realm-claim terminals — each choice routes forward
      # to its dedicated claim scene, which sets the §20
      # gate flag.
      - id: "claim_hero_path"
        text: "Take up the hero's path."
        next_node_id: "act3.claim_hero"
      - id: "claim_dragon_kinship"
        text: "Offer kinship to the void dragon."
        next_node_id: "act3.claim_dragon_alliance"
      - id: "claim_kingdoms_throne"
        text: "Take the kingdom's throne."
        next_node_id: "act3.claim_kingdom"
      - id: "claim_unbound_magic"
        text: "Unbind the magic in your chest."
        next_node_id: "act3.claim_archmage"
      - id: "claim_shadow_throne"
        text: "Claim the shadow throne."
        next_node_id: "act3.claim_shadow_lord"
      - id: "claim_both_worlds"
        text: "Step between both worlds."
        next_node_id: "act3.claim_world_guardian"
      - id: "claim_dark_descent"
        text: "Follow the relic into darkness."
        next_node_id: "act3.claim_corruption"
      - id: "claim_serpent_crown"
        text: "Take the serpent's crown upon your head."
        next_node_id: "act3.claim_dragon_sovereign"
        conditions:
          - flag: "relic_claimed"
      # Schema-coverage choices (Phase 40.A follow-up #1).
      # Each choice exercises one or more Condition/Effect types
      # that the Phase 37.B schema declares but the frontier
      # worldpack was not previously exercising: HasItem, Not,
      # HasEnding, Or, And conditions plus AddItem, ClearFlag,
      # RemoveItem effects. The runtimeWalk tests enumerate
      # choices by id and pick the FIRST match in
      # AvailableChoices, so adding sibling choices gated by
      # fresh flags / inventory / endings does not perturb
      # any existing test path.
      - id: "consume_iron_sword"
        text: "Sheathe the iron sword into the keep's stone; its edge dulls against the relic's hum."
        next_node_id: "act3.the_end"
        conditions:
          - has_item: "Iron Sword"
        effects:
          - remove_item: { key: "Iron Sword", count: 1 }
      - id: "pick_up_coin"
        text: "A handful of coins lies half-buried underfoot; gather them."
        next_node_id: "act3.the_end"
        conditions:
          # One-shot: the old gate was `not: { flag: "rested" }` but
          # `rested` is never set anywhere in the worldpack, so the
          # choice was structurally always-on. Replaced with a fresh
          # `coins_not_yet_picked` flag (set in effects below) so
          # repeated returns to act3.keep_interior do not bankroll
          # the player. The `rested` reference is historical only.
          - not: { flag: "coins_not_yet_picked" }
        effects:
          - add_item: { key: "Coin", count: 5 }
          - set_flag: "coins_not_yet_picked"
      # WARNING: this choice clears `relic_claimed`, which is also
      # the gate for `claim_serpent_crown` (→ dragon_sovereign
      # ending, §20 priority 8). A player who picks
      # `return_relic` first loses access to dragon_sovereign until
      # `relic_claimed` is re-set elsewhere. The canonical §38.E
      # test spines do not include this choice; any new spine that
      # does must audit the §20 ending-priority matrix.
      #
      - id: "return_relic"
        text: "Lay the dragon relic back into the vault; the humming stops."
        next_node_id: "act3.the_end"
        conditions:
          - flag: "relic_claimed"
        effects:
          - clear_flag: "relic_claimed"
      # RARE: `has_ending` only resolves Truthy on a SaveGame whose
      # EndingsUnlocked contains "wanderer". The worldpack has no
      # mid-playthrough trigger for ending evaluation (endings
      # resolve at termination per §23): this is the honest §37.B
      # coverage demonstration of the HasEnding Condition type.
      # Reachable only via §39 (SaveGame -> Load), not from any
      # in-playthrough spine. Decision recorded §40.A follow-up #2
      # (accept-as-rare over mid-playthrough substitution).
      - id: "remember_wanderer"
        text: "Recall the wandering life you once lived; the keep's silence answers back."
        next_node_id: "act3.the_end"
        conditions:
          - has_ending: "wanderer"
        effects:
          - set_flag: "considered_wanderer"
      - id: "claim_weathered_path"
        text: "Whether by crown or by courage, you have a seat at the table."
        next_node_id: "act3.the_end"
        conditions:
          - or:
              - flag: "kingdom_aligned"
              - variable: { key: "Courage", value: 50 }
        effects:
          - add_item: { key: "Tide-Coin", count: 1 }
      - id: "claim_brave_and_trusting"
        text: "You have walked heroic roads and Elara still trusts you; spend a coin to remember."
        next_node_id: "act3.the_end"
        conditions:
          - and:
              - flag: "mid_completed"
              - relationship: { character: "Elara", axis: "trust", value: 25 }
        effects:
          - remove_item: { key: "Coin", count: 1 }

  - id: "act3.elaras_vigil"
    title: "E2 — Elara's vigil, by torchlight"
    text: |
      The vigil is not a conversation; it is a long evening of
      walking the keep's ramparts and not talking. Elara knows
      where the bolts need tightening. She knows the path of
      the wind across the keep's width. By the time the third
      torch has burned down to the second floor, you have
      stopped walking next to each other and started walking
      with each other, and the name of the difference is not
      something you will write down.
    choices:
      - id: "vigil_until_dawn"
        text: "Stay until dawn."
        next_node_id: "act3.keep_interior"
        effects:
          # absolute-set, see thank_selene
          - modify_relationship: { character: "Elara", axis: "affection", value: 75 }
          - set_flag: "elara_vigil_complete"

  - id: "act3.selenes_deep_trust"
    title: "E3 — Selene, finishing the reading"
    text: |
      Selene does not finish the reading. She re-reads two
      chapters from the relic three times each over a long
      afternoon, marks one of them with a small grey seal,
      puts the relic back into your hands, and says the word
      you have been waiting to hear since the spire: \"Yes.
      That is what it says.\" You take the relic back. She
      takes your hand for a moment. Then she lets go.
    choices:
      - id: "thank_selene"
        text: "Thank her."
        next_node_id: "act3.keep_interior"
        effects:
          # ModifyRelationship is absolute-set (clamped [-100,100],
          # internal/story/effects.go), NOT additive. This choice
          # sets Selene trust = 50 (gate threshold); do not "stack"
          # on top of let_selene_read's set or the latter is
          # clobbered. See vigil_until_dawn (Elara=75) and
          # take_the_ring (Orion=75) for the same pattern.
          - modify_relationship: { character: "Selene", axis: "trust", value: 50 }
          - set_flag: "selene_deep_trust_complete"

  - id: "act3.orions_meeting"
    title: "E4 — Orion by the fire"
    text: |
      The fire is older than the keep. Orion brings his own
      wood. He has not had a friend who could read the relic
      since your grandfather's lifetime and the way he asks
      about it is not the way he asks about the relic. He asks
      about you. By the time the fire has burned down twice,
      he has put a small, plain ring on the stone between you
      and he has not asked a question in a long time.
    choices:
      - id: "take_the_ring"
        text: "Take the ring he has not yet offered you."
        next_node_id: "act3.keep_interior"
        effects:
          # absolute-set, see thank_selene
          - modify_relationship: { character: "Orion", axis: "affection", value: 75 }
          - set_flag: "orion_meeting_complete"

  - id: "act3.claim_hero"
    title: "E5 — The hero's claim"
    text: |
      The companions gather at the keep's gate. The relic
      produces no further visions. The path forward has the
      quality of a path walked once before by people you would
      have called heroes when you were younger. You walk it
      with the people walking with you; you do not walk it
      alone.
    choices:
      - id: "walk_with_them"
        text: "Walk forward with them."
        next_node_id: "act3.the_end"
        effects:
          - set_flag: "mid_completed"
          - set_flag: "saved_companions"

  - id: "act3.claim_dragon_alliance"
    title: "E6 — Kinship with the void dragon"
    text: |
      The relic hums. The void-serpent you saw on the mural
      becomes, in the half-dark of the keep, a thing you can
      see in two places at once — the figure above the dome
      and the figure that slowly, with no malice, looks at you
      from across the floor. It does not breathe fire. It
      asks. You answer.
    choices:
      - id: "offer_kinship"
        text: "Offer kinship."
        next_node_id: "act3.the_end"
        effects:
          - set_flag: "dragon_kinship_offered"

  - id: "act3.claim_kingdom"
    title: "E7 — The kingdom's throne"
    text: |
      The kingdom's crown is older than the relic and lighter
      than the relic and it fits your head the way Aldric's
      hand fitted your shoulder three days ago. You have not
      known that you were meant to wear it until now. The
      keeper is in the doorway, smiling for the first time
      since you came into the keep.
    choices:
      - id: "wear_the_crown"
        text: "Wear the crown."
        next_node_id: "act3.the_end"
        effects:
          - set_flag: "kingdom_aligned"

  - id: "act3.claim_archmage"
    title: "E8 — The unbound magic"
    text: |
      The relic's teacher is the relic itself. Your hands
      remember what they have done. The slate you carried,
      the rune you inscribed, the chisel you laid down at
      Ashwick — they are still in your hands, in some
      register you have not noticed before, and the keep is
      full of the language they speak.
    choices:
      - id: "speak_the_language"
        text: "Speak the language."
        next_node_id: "act3.the_end"
        effects:
          - set_flag: "archmage_unbound"

  - id: "act3.claim_shadow_lord"
    title: "E9 — The shadow throne"
    text: |
      The underworld breaks through in a small way at first:
      a draft, a flicker, a candle that goes out for no
      reason. Then a door opens in the floor that was not
      there a moment ago. The person on the other side of it
      offers you the only kind of authority that comes with
      a price you have already paid.
    choices:
      - id: "take_the_throne"
        text: "Take the throne they offer."
        next_node_id: "act3.the_end"
        effects:
          - set_flag: "underworld_broken"

  - id: "act3.claim_world_guardian"
    title: "E10 — Between both worlds"
    text: |
      There is a place inside the relic where two worlds touch.
      You have felt it every time the relic changed the
      weather on the mountain. You have felt it every time
      Maren wrote the widow's name in the margin. The path
      forward is the path between. You step into it.
    choices:
      - id: "step_between"
        text: "Step between both worlds."
        next_node_id: "act3.the_end"
        effects:
          - set_flag: "both_worlds_saved"

  - id: "act3.claim_corruption"
    title: "E11 — The dark descent"
    text: |
      The relic's other path is darker. It has been darker
      since the relic first made the weather change. You
      have been offered the choice between two thirds of the
      world and one half of yourself, and you choose the half.
    choices:
      - id: "walk_into_the_dark"
        text: "Walk into the dark."
