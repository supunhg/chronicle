# Frontier world pack: occupations
# chronicle-spec.md §2.5
#
# 15 occupation archetypes. Each occupation has:
#   - needs_weights: how strongly this occupation cares about each need
#   - base_wealth: starting wealth for someone with this job
#   - social_class: lower, middle, or upper
#   - locations: where this occupation is typically found

