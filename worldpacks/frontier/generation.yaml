# Marriage model. In Phase 3 v1, marriages arise only from `propose_marriage`
# actions. Same-class preference is a soft bias; cross-class is possible.
marriage:
  same_class_preference: 0.7  # 70% of marriages are within class
  min_age_gap: 1
  max_age_gap: 15
