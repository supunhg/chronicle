# Frontier world pack: LLM client defaults.
#
# chronicle-spec.md §3.2: the LLM client reads env vars > llm.yaml >
# built-in defaults. Worldpack authors can ship a world-specific
# llm.yaml so the world "just works" out of the box for accounts
# that have access to the listed model. Players whose accounts
# don't have this model can override per session with the
# OPENCODE_ZEN_MODEL / OPENCODE_ZEN_ENDPOINT env vars (or by
# passing -config <path> to `chronicle doctor`).
#
# This file is loaded automatically by `chronicle new` and
# `chronicle [resume|play] -repl` when the resolved worldpack
# directory contains llm.yaml. Set every field to "" to fall
# back to env / defaults (the LLM client still works — these
# are merely convenience defaults).
#
# Field reference: see internal/llm/config.go.

# OpenAI-compatible chat-completions endpoint. The /v1 suffix is
# required; the LLM client appends /chat/completions and /models.
endpoint: https://opencode.ai/zen/v1

# Default chat model. The Narrator LLM (Phase 17.4) and the
# intent parser's fallback both use this. Override with the
# OPENCODE_ZEN_MODEL env var.
model: deepseek-v4-flash-free

# Per-request timeout. A chat-completions call can take a few
# seconds on a slow model; 30s is generous without being
# unbounded. The Ping call has its own 10s budget.
timeout: 30s
