# Frontier world pack: entities
# chronicle-spec.md §2.1
#
# All locations in the Free Marches. IDs are stable strings; names
# are display strings.

region:
  name: "The Free Marches"
  size_km: 120
  era: "Late Medieval / Early Renaissance (1400-1500 equivalent)"
  # Phase 26.5: bootstrap's auto-PlayerID logic picks the
  # first non-merchant alive person at this location as the
  # implicit player (when no explicit PlayerID is set). This
  # keeps the auto-designation worldpack-driven instead of
  # hardcoded in bootstrap.go.
  default_player_location: "blackwater"

locations:
  - id: "blackwater"
    name: "Blackwater"
    kind: "town"
    region: "The Free Marches"
    population: 80
    population_cap: 80
    buildings:
      - "Town Hall"
      - "The Drunken Fox Inn"
      - "Market Square"
      - "Ironheart Smithy"
      - "Hearthstone Bakery"
      - "Temple of the Dawn"
      - "Blackwater Stables"
      - "Merchant Guild Hall"
      - "The Black Duck Tavern"
      - "Town Gates"
      - "River Docks"
      - "Graveyard"

  - id: "millbrook"
    name: "Millbrook"
    kind: "village"
    region: "The Free Marches"
    population: 13
    population_cap: 20
    buildings:
      - "Old Mill"
      - "Millbrook Chapel"
      - "Village Well"

  - id: "ashford"
    name: "Ashford"
    kind: "village"
    region: "The Free Marches"
    population: 12
    population_cap: 20
    buildings:
      - "Ashford Farmstead"
      - "The Crossroads Inn"
      - "Village Shrine"

  - id: "thornkeep"
    name: "Thornkeep"
    kind: "village"
    region: "The Free Marches"
    population: 13
    population_cap: 20
    buildings:
      - "Thornkeep Stockade"
      - "Hunter's Lodge"
      - "Smoking House"

  - id: "elderfield"
    name: "Elderfield"
    kind: "village"
    region: "The Free Marches"
    population: 12
    population_cap: 20
    buildings:
      - "Elderfield Granary"
      - "Herb Garden"
      - "Shepherd's Hut"

  - id: "dawn_monastery"
    name: "Dawn Monastery"
    kind: "monastery"
    region: "The Free Marches"
    population: 5
    population_cap: 10
    buildings:
      - "Monastery Chapel"
      - "Scriptorium"
      - "Monastery Gardens"
      - "Bell Tower"

  - id: "northwatch_fort"
    name: "Northwatch Fort"
    kind: "fort"
    region: "The Free Marches"
    population: 5
    population_cap: 15
    buildings:
      - "Commander's Hall"
      - "Armory"
      - "Watchtower"
      - "Fort Barracks"

trade_routes:
  - id: "blackwater_millbrook"
    from: "blackwater"
    to: "millbrook"
  - id: "blackwater_ashford"
    from: "blackwater"
    to: "ashford"
  - id: "blackwater_thornkeep"
    from: "blackwater"
    to: "thornkeep"
  - id: "blackwater_elderfield"
    from: "blackwater"
    to: "elderfield"
  - id: "ashford_dawn_monastery"
    from: "ashford"
    to: "dawn_monastery"
  - id: "northwatch_thornkeep"
    from: "northwatch_fort"
    to: "thornkeep"
  - id: "millbrook_elderfield"
    from: "millbrook"
    to: "elderfield"
  - id: "ashford_thornkeep"
    from: "ashford"
    to: "thornkeep"

geography:
  forest: "Whisperwood"
  river: "River Black"
  landmarks:
    - "The Old Mill"
    - "Dawn Hill"
    - "Whisperwood Edge"
    - "The Standing Stones"
    - "Raven's Crossing"
    - "The Sunken Road"
    - "Widow's Peak"
    - "The Bone Fields"
